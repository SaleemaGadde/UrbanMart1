<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>About Us</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="@{/js/script.js}"></script>
<!-- Custom CSS -->
    <link rel="stylesheet" href="web.css">
	<script src="cart.js"></script>








<body>
	<header>

<form th:action="@{/placeOrder}" method="post">

    <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="fullName" class="form-control" placeholder="Enter your name" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="tel" name="phone" class="form-control" placeholder="Enter phone number" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Delivery Address</label>
        <textarea name="address" class="form-control" rows="3" required></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Payment Method</label>

        <select name="paymentMethod" class="form-select">
            <option value="Cash on Delivery">Cash on Delivery</option>
            <option value="UPI">UPI</option>
            <option value="Credit Card">Credit Card</option>
            <option value="Debit Card">Debit Card</option>
        </select>

    </div>
	<input type="hidden" name="productId" value="1">
	<input type="hidden" name="productName" value="Test Product">
	<input type="hidden" name="quantity" value="1">
	<input type="hidden" name="price" value="500">

    <button type="submit" class="btn btn-success w-100">
        Place Order
    </button>

</form>
</header>
</body>
<!--Footer-->

<footer class="bg-dark text-white pt-5 pb-3">

    <div class="container">

        <div class="row">

            <div class="col-md-4">
                <h4>NovaStore</h4>
                <p>Your one-stop destination for fashion, electronics, shoes, and more.</p>
            </div>

            <div class="col-md-2">
                <h5>Quick Links</h5>
                <ul class="list-unstyled">
                    <li><a th:href="@{/}" class="text-white text-decoration-none">Home</a></li>
                    <li><a th:href="@{/shop}" class="text-white text-decoration-none">Shop</a></li>
                    <li><a th:href="@{/about}" class="text-white text-decoration-none">About</a></li>
                    <li><a th:href="@{/contact} "class="text-white text-decoration-none">Contact</a></li>
                </ul>
            </div>

            <div class="col-md-3">
                <h5>Contact</h5>
                <p>Email: support@novastore.com</p>
                <p>Phone: +91 98765 43210</p>
            </div>

            <div class="col-md-3">
                <h5>Follow Us</h5>
                <p>Facebook | Instagram | X | LinkedIn</p>
            </div>

        </div>

        <hr>

        <p class="text-center mb-0">
            © 2026 NovaStore. All Rights Reserved.
        </p>

    </div>

</footer>
